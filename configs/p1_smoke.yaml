# Phase 1 end-to-end smoke test: tiny collection, mock ranker, a battery slice that
# exercises every new mechanism — relaxed variants, aliases, margin params, WordNet
# semantic axioms — through the rq2 runner (a superset of the rq1 runner). Minutes,
# no large downloads.
experiment: p1_smoke
variant: scifact_mock
seed: 42
primary_metric: fidelity

dataset:
  irds_id: beir/scifact/test   # 5k-doc collection; index is built locally in seconds

first_stage:
  retriever: bm25
  pool_depth: 20

pairs:
  strategy: uniform            # exercises the gap-gradient quantile-binning path
  per_query: 30
  max_queries: 8

rankers:
  - backend: mock
    order_swap: true

axioms:
  lexical:
    - TFC1
    - LNC1
    - TF-LNC
    - PROX1
    - {name: TFC1, alias: TFC1@len0.5, params: {precondition_margin: 0.5}}
    - {name: LNC1, alias: LNC1@tf0.5, params: {margin_fraction: 0.5}}
    - {name: TF-LNC-R, alias: TF-LNC@len0.3, params: {margin_fraction: 0.3}}
    - {name: M-TDC-R, alias: M-TDC@mass0.3, params: {margin_fraction: 0.3}}
  semantic:
    - {name: STMC1, alias: STMC1@wn, params: {similarity: wordnet}}
