# RQ2 grid cell: DL19 × top-10 all-pairs, both rankers, semantic axioms at the
# WordNet tier (phase1-design.md §5). The joint fit compares lexical-only vs.
# lexical+semantic; the deltas decide the 7.24 GB fastText gate (§5.1). Verdicts are
# shared with rq1 through the preference store — only axiom columns are new here.
experiment: rq2_semantic_agreement
variant: dl19_top10
seed: 42
primary_metric: fidelity

dataset:
  irds_id: msmarco-passage/trec-dl-2019/judged
  hf_artifact: pyterrier/msmarco-passage.terrier

first_stage:
  retriever: bm25
  pool_depth: 100

pairs:
  strategy: top_k_all_pairs
  k: 10

rankers:
  - backend: openai
    model: models/qwen3.6-35B-A3B-AWQ   # the id the server reports at /v1/models
    base_url: http://localhost:9086/v1
    prompt_version: v1
    order_swap: true
    max_chars: 2000
    extra_body:
      chat_template_kwargs:
        enable_thinking: false          # thinking tokens first would break logprob scoring
  - backend: hf
    model: google/flan-t5-large
    prompt_version: v0
    order_swap: true
    max_chars: 2000
  # flan-t5-xl (3B) scale rung — Phase 2b (docs/phase2b-ranker-scale.md). Verdicts are
  # collected on bronze (CPU, bf16; the iGPU is queue-contended) and synced into the store.
  - backend: hf
    model: google/flan-t5-xl
    prompt_version: v0
    order_swap: true
    max_chars: 2000
    device: cpu
    dtype: bfloat16

axioms:
  # The lexical feature set is the full rq1 battery so the semantic delta is measured
  # against the axioms' best lexical shot, not the strict core alone.
  lexical:
    - TFC1
    - TFC3
    - M-TDC
    - LNC1
    - TF-LNC
    - PROX1
    - PROX2
    - PROX3
    - PROX4
    - PROX5
    - AND
    - DIV
    - LB1
    - {name: TFC1, alias: TFC1@len0.2, params: {precondition_margin: 0.2}}
    - {name: TFC1, alias: TFC1@len0.5, params: {precondition_margin: 0.5}}
    - {name: TFC3, alias: TFC3@len0.2, params: {precondition_margin: 0.2}}
    - {name: TFC3, alias: TFC3@len0.5, params: {precondition_margin: 0.5}}
    - {name: LNC1, alias: LNC1@tf0.2, params: {margin_fraction: 0.2}}
    - {name: LNC1, alias: LNC1@tf0.5, params: {margin_fraction: 0.5}}
    - {name: TF-LNC-R, alias: TF-LNC@len0.1, params: {margin_fraction: 0.1}}
    - {name: TF-LNC-R, alias: TF-LNC@len0.3, params: {margin_fraction: 0.3}}
    - {name: M-TDC-R, alias: M-TDC@mass0.1, params: {margin_fraction: 0.1}}
    - {name: M-TDC-R, alias: M-TDC@mass0.3, params: {margin_fraction: 0.3}}
  semantic:
    # WordNet tier (default). fastText variants (@ft) enter only if the §4.1 gate
    # opens; then add e.g. {name: STMC1, alias: STMC1@ft, params: {similarity: fasttext}}.
    - {name: STMC1, alias: STMC1@wn, params: {similarity: wordnet}}
    - {name: STMC2, alias: STMC2@wn, params: {similarity: wordnet}}
    - {name: REG, alias: REG@wn, params: {similarity: wordnet}}
    - {name: ANTI-REG, alias: ANTI-REG@wn, params: {similarity: wordnet}}
