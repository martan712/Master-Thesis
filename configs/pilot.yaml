# Phase 0 pilot on TREC DL19 (docs/phase0-design.md).
experiment: p0_pilot
seed: 42
primary_metric: fidelity   # the pilot characterises the model, not the qrels (plan §4.1)

dataset:
  irds_id: msmarco-passage/trec-dl-2019/judged
  hf_artifact: pyterrier/msmarco-passage.terrier   # prebuilt index, one-time download
  # terrier_dataset: msmarco_passage + index_variant: terrier_stemmed would use the
  # classic Terrier Data Repository (data.pyterrier.org), unreachable from this network

first_stage:
  retriever: bm25
  pool_depth: 100

pairs:
  strategy: top_k_all_pairs
  k: 10                    # 45 pairs/query x 43 queries x 2 orders ~ 3.9k model calls

ranker:
  backend: hf
  model: google/flan-t5-large   # only Flan-T5 to pass the order-swap gate (small 0/4, base 3/4)
  prompt_version: v0
  order_swap: true              # measure position bias (plan risk: order sensitivity)
  max_chars: 2000

axioms:
  lexical: [TFC1, TFC3, M-TDC, LNC1, TF-LNC, PROX1, PROX2, PROX3, PROX4, PROX5]
  semantic: []   # STMC1/STMC2 need embedding downloads; enable after measuring the cost
