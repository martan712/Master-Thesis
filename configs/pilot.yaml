# Phase 0 pilot on TREC DL19 (docs/phase0-plan.md).
experiment: p0_pilot
seed: 42
primary_metric: fidelity   # the pilot characterises the model, not the qrels (plan §4.1)

dataset:
  irds_id: msmarco-passage/trec-dl-2019/judged
  terrier_dataset: msmarco_passage
  index_variant: terrier_stemmed   # prebuilt index (~2 GB one-time download)

first_stage:
  retriever: bm25
  pool_depth: 100

pairs:
  strategy: top_k_all_pairs
  k: 10                    # 45 pairs/query x 43 queries x 2 orders ~ 3.9k model calls

ranker:
  backend: hf
  model: google/flan-t5-small   # wiring model; the definitive choice is a pilot outcome
  prompt_version: v0
  order_swap: true              # measure position bias (plan risk: order sensitivity)
  max_chars: 2000

axioms:
  lexical: [TFC1, TFC3, M-TDC, LNC1, TF-LNC, PROX1, PROX2, PROX3, PROX4, PROX5]
  semantic: []   # STMC1/STMC2 need embedding downloads; enable after measuring the cost
