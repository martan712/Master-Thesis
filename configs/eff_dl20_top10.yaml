# Effectiveness gate: DL20 × top-10 all-pairs (phase1-design.md §4). Copeland-aggregate
# each ranker's cached pairwise verdicts (= PRP-allpair) into a ranking and compare it to
# the BM25 baseline on nDCG@10 / MAP. Verdicts are shared with rq1_dl20_top10 through the
# preference store (same dataset/model/prompt_version) → ZERO new model calls here.
experiment: ranking_effectiveness
variant: dl20_top10
seed: 42
primary_metric: effectiveness

dataset:
  irds_id: msmarco-passage/trec-dl-2020/judged
  hf_artifact: pyterrier/msmarco-passage.terrier

first_stage:
  retriever: bm25
  pool_depth: 100

pairs:
  strategy: top_k_all_pairs
  k: 10

rankers:
  - backend: openai
    model: models/qwen3.6-35B-A3B-AWQ   # the id the server reports at /v1/models
    base_url: http://localhost:9086/v1
    prompt_version: v1
    order_swap: true
    max_chars: 2000
    extra_body:
      chat_template_kwargs:
        enable_thinking: false          # thinking tokens first would break logprob scoring
  - backend: hf
    model: google/flan-t5-large
    prompt_version: v0
    order_swap: true
    max_chars: 2000

axioms:
  lexical: []
  semantic: []
