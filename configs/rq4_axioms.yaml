# RQ4 (Phase 3): do residual-seed axioms VERB/QCOV add fidelity and effectiveness to a
# fitted, model-specific axiom surrogate? Reads the two rq2 top-10 cells' cached verdicts
# and axiom preferences — zero model calls. Four locked variants (classical, +VERB, +QCOV,
# +both) share query-disjoint folds; qrels are used only after OOF pair prediction.
experiment: rq4_axioms
variant: pooled_top10
seed: 42
primary_metric: fidelity

sources:
  - configs/rq2_dl19_top10.yaml
  - configs/rq2_dl20_top10.yaml
